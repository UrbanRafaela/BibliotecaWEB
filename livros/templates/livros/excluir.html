<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Excluir</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Excluir Livro</h1>

    <p>Tem certeza que deseja excluir "{{ livro.titulo }}"?</p>

    <form method="POST">
        {% csrf_token %}

        <button class="btn btn-danger">
            Confirmar Exclusão
        </button>

        <a href="{% url 'lista_livros' %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
